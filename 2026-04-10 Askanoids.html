<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-status-bar-style" content="black-translucent">
  <title>ASKANOIDS</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%; width: 100%;
      overflow: hidden;
      background: #05050f;
      font-family: 'Courier New', Courier, monospace;
      color: #00ffff;
      touch-action: manipulation;
      user-select: none; -webkit-user-select: none;
    }

    /* ── Landscape guard ────────────────────────────────── */
    #landscape-warning {
      display: none;
      position: fixed; inset: 0; z-index: 9999;
      background: #05050f;
      flex-direction: column;
      align-items: center; justify-content: center; gap: 24px;
    }
    @media (orientation: landscape) { #landscape-warning { display: flex; } }
    #landscape-warning svg { width: 72px; height: 72px; }
    #landscape-warning p {
      font-size: 16px; letter-spacing: 0.25em; text-transform: uppercase;
      color: #00ffff; text-shadow: 0 0 12px #00ffff, 0 0 24px #00ffff44;
    }

    /* ── Layout ──────────────────────────────────────────── */
    #game {
      display: flex; flex-direction: column;
      height: 100dvh; width: 100%; max-width: 480px; margin: 0 auto;
    }

    /* ── Status bar (20%) ────────────────────────────────── */
    #status-bar {
      flex: 2; display: flex;
      align-items: center; justify-content: space-between;
      padding: 6px 14px;
      border-bottom: 1px solid #00ffff22;
      background: linear-gradient(to bottom, #060618, #05050f);
    }
    .stat-col { display: flex; flex-direction: column; gap: 1px; }
    .stat-col.mid { align-items: center; }
    .stat-col.right { align-items: flex-end; }
    .stat-label {
      font-size: 8px; color: #00ffff66; letter-spacing: 0.18em; text-transform: uppercase;
    }
    .stat-value {
      font-size: 20px; font-weight: bold; color: #00ffff;
      text-shadow: 0 0 10px #00ffff; letter-spacing: 0.04em;
    }
    #lives-row { display: flex; gap: 6px; align-items: center; margin-top: 2px; }
    .life-pip {
      width: 18px; height: 18px;
      transition: opacity 0.3s;
    }
    .life-pip.lost { opacity: 0.12; }

    /* ── Game area (60%) ──────────────────────────────────── */
    #game-area {
      flex: 6; position: relative; overflow: hidden; background: #05050f;
    }
    #game-area::after {
      content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 5;
      background: repeating-linear-gradient(
        to bottom, transparent 0, transparent 2px,
        rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px
      );
    }
    #svg { width: 100%; height: 100%; display: block; }
    #flash {
      position: absolute; inset: 0; pointer-events: none; z-index: 10;
      background: rgba(255,34,68,0.35); opacity: 0; transition: opacity 0.08s;
    }
    #flash.on { opacity: 1; }

    /* ── Controls (20%) ──────────────────────────────────── */
    #controls {
      flex: 2; display: flex; flex-direction: column; justify-content: center;
      gap: 6px; padding: 6px 14px;
      border-top: 1px solid #00ffff22;
      background: linear-gradient(to top, #060618, #05050f);
    }
    .ctrl-row { display: flex; align-items: center; gap: 10px; }


    /* ── Infinity scrubber ────────────────────────────────── */
    .scrubber-wrap { flex: 1; display: flex; flex-direction: column; gap: 5px; touch-action: none; }
    #angle-display {
      font-size: 10px; color: #00ffff88; letter-spacing: 0.1em;
      text-align: center; text-shadow: 0 0 6px #00ffff44;
    }
    #scrubber {
      position: relative; height: 38px; border-radius: 6px;
      background: #08081a; border: 1px solid #00ffff33;
      overflow: hidden; cursor: grab; touch-action: none;
    }
    #scrubber:active { cursor: grabbing; }
    /* scrolling tick marks as background */
    #scrubber-ticks {
      position: absolute; inset: 0;
      background: repeating-linear-gradient(
        to right,
        #00ffff22 0px, #00ffff22 1px,
        transparent 1px, transparent 18px
      );
      pointer-events: none;
    }
    /* gradient fade on both sides */
    #scrubber::before, #scrubber::after {
      content: ''; position: absolute; top: 0; bottom: 0; width: 22px;
      z-index: 2; pointer-events: none;
    }
    #scrubber::before { left: 0;  background: linear-gradient(to right, #08081a, transparent); }
    #scrubber::after  { right: 0; background: linear-gradient(to left,  #08081a, transparent); }
    /* center thumb line */
    #scrubber-thumb {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 3px; height: 28px; border-radius: 2px;
      background: #00ffff; box-shadow: 0 0 8px #00ffff, 0 0 16px #00ffff55;
      z-index: 3; pointer-events: none;
    }
    /* hint arrows */
    #scrubber-hint {
      position: absolute; inset: 0; z-index: 4; pointer-events: none;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 7px; color: #00ffff44; font-size: 13px; line-height: 1;
    }

    /* ── Enemy spin ───────────────────────────────────────── */
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .spin-n  { animation: spin 1.5s linear infinite; transform-box: fill-box; transform-origin: center; }
    .spin-f  { animation: spin 0.55s linear infinite; transform-box: fill-box; transform-origin: center; }
    .spin-s  { animation: spin 3.2s linear infinite; transform-box: fill-box; transform-origin: center; }
    .spin-m  { animation: spin 1s linear infinite; transform-box: fill-box; transform-origin: center; }
    .spin-b  { animation: spin 4.5s linear infinite; transform-box: fill-box; transform-origin: center; }
  </style>
</head>
<body>

<!-- Landscape warning -->
<div id="landscape-warning">
  <svg viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <filter id="lf">
        <feGaussianBlur stdDeviation="2" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>
    <rect x="12" y="6" width="48" height="60" rx="6" stroke="#00ffff" stroke-width="2.5" filter="url(#lf)"/>
    <rect x="20" y="16" width="32" height="36" rx="2" fill="#00ffff11" stroke="#00ffff44" stroke-width="1"/>
    <circle cx="36" cy="58" r="3" fill="#00ffff" filter="url(#lf)"/>
    <path d="M26 36 L36 26 L46 36" stroke="#ff00ff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#lf)"/>
    <path d="M36 26 L36 46" stroke="#ff00ff" stroke-width="2.5" stroke-linecap="round"/>
  </svg>
  <p>Rotate Device</p>
</div>

<!-- Game -->
<div id="game">

  <!-- Status bar -->
  <div id="status-bar">
    <div class="stat-col">
      <span class="stat-label">WAVE</span>
      <span class="stat-value" id="wave-val">—</span>
      <span class="stat-label" id="tier-label" style="color:#00ff4188;margin-top:1px;">SINGLE</span>
    </div>
    <div class="stat-col mid">
      <span class="stat-label">SCORE</span>
      <span class="stat-value" id="score-val">0</span>
    </div>
    <div class="stat-col right">
      <span class="stat-label">LIVES</span>
      <div id="lives-row"></div>
    </div>
  </div>

  <!-- Game area -->
  <div id="game-area">
    <div id="flash"></div>
    <svg id="svg" viewBox="0 0 400 400" preserveAspectRatio="xMidYMid meet"
         xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!-- Glow: cyan -->
        <filter id="gc" x="-60%" y="-60%" width="220%" height="220%">
          <feGaussianBlur stdDeviation="4" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <!-- Glow: magenta -->
        <filter id="gm" x="-60%" y="-60%" width="220%" height="220%">
          <feGaussianBlur stdDeviation="4" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <!-- Glow: green -->
        <filter id="gg" x="-60%" y="-60%" width="220%" height="220%">
          <feGaussianBlur stdDeviation="3.5" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <!-- Glow: yellow -->
        <filter id="gy" x="-60%" y="-60%" width="220%" height="220%">
          <feGaussianBlur stdDeviation="3" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <!-- Grid pattern -->
        <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
          <path d="M40 0 L0 0 0 40" fill="none" stroke="#0c1e2e" stroke-width="0.6"/>
        </pattern>
      </defs>
      <!-- Static background -->
      <rect width="400" height="400" fill="#05050f"/>
      <rect width="400" height="400" fill="url(#grid)"/>
      <g id="stars-layer"></g>
      <!-- Game layers — back to front -->
      <g id="enemies-layer"></g>
      <g id="drops-layer"></g>
      <g id="bullets-layer"></g>
      <g id="turret-layer"></g>
      <g id="effects-layer"></g>
      <!-- Screen overlays -->
      <g id="overlay-layer"></g>
    </svg>
  </div>

  <!-- Controls -->
  <div id="controls">
    <div class="ctrl-row">
      <div class="scrubber-wrap">
        <div id="angle-display">↑ 000°</div>
        <div id="scrubber">
          <div id="scrubber-ticks"></div>
          <div id="scrubber-thumb"></div>
          <div id="scrubber-hint"><span>‹</span><span>›</span></div>
        </div>
      </div>
    </div>
  </div>

</div><!-- #game -->

<script>
'use strict';

// ── SVG namespace helper ──────────────────────────────────────────────────────
const NS = 'http://www.w3.org/2000/svg';
function $s(tag, attrs) {
  const el = document.createElementNS(NS, tag);
  if (attrs) for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, String(v));
  return el;
}
function setSVGHTML(el, html) {
  // Safely set innerHTML on SVG elements
  const tmp = document.createElement('div');
  tmp.innerHTML = `<svg xmlns="${NS}">${html}</svg>`;
  el.innerHTML = '';
  const src = tmp.firstChild;
  while (src.firstChild) el.appendChild(src.firstChild);
}

// ── Config ────────────────────────────────────────────────────────────────────
const CFG = {
  bulletSpeed:  400,
  bulletR:      4,
  muzzleOffset: 45,      // px from center to barrel tip
  hitR:         26,      // enemy reaching this radius = turret hit
  spawnR:       272,     // enemy spawn radius
  spawnInterval: 0.42,   // seconds between spawns
  waveDelay:    3.5,     // seconds between waves
  keyRotDeg:    380,     // degrees/sec for arrow keys

  // Turret upgrade tiers — unlocked automatically by wave
  tiers: [
    { label:'SINGLE',  angles:[0],                     rate:5,  piercing:false }, // wave 1–2
    { label:'DUAL',    angles:[-14,14],                 rate:5,  piercing:false }, // wave 3–4
    { label:'TRIPLE',  angles:[-20,0,20],               rate:6,  piercing:false }, // wave 5–6
    { label:'QUAD',    angles:[-28,-9,9,28],            rate:6,  piercing:false }, // wave 7–9
    { label:'LASER',   angles:[-24,-8,0,8,24],          rate:8,  piercing:true  }, // wave 10–12
    { label:'SPREAD',  angles:[-30,-18,-6,6,18,30],     rate:10, piercing:true  }, // wave 13+
  ],

  types: {
    basic:    { size:10, hp:1, speed:42,  score:10,  color:'#00ffff', spinCls:'spin-n', zigzag:false },
    scout:    { size:8,  hp:1, speed:96,  score:20,  color:'#ff00ff', spinCls:'spin-f', zigzag:false },
    speeder:  { size:7,  hp:1, speed:145, score:30,  color:'#ff44ff', spinCls:'spin-f', zigzag:true  },
    tank:     { size:18, hp:3, speed:28,  score:50,  color:'#ffff00', spinCls:'spin-s', zigzag:false },
    splitter: { size:12, hp:2, speed:58,  score:100, color:'#00ff41', spinCls:'spin-m', zigzag:false },
    armored:  { size:22, hp:6, speed:22,  score:150, color:'#ff8800', spinCls:'spin-s', zigzag:false },
    boss:     { size:32, hp:8, speed:18,  score:200, color:'#ff6600', spinCls:'spin-b', zigzag:false },
  },
};

function tierForWave(w) {
  if (w >= 13) return 5;
  if (w >= 10) return 4;
  if (w >= 7)  return 3;
  if (w >= 5)  return 2;
  if (w >= 3)  return 1;
  return 0;
}

// ── Game state ────────────────────────────────────────────────────────────────
const G = {
  phase: 'title',   // title | playing | wave_clear | game_over | paused
  wave:  0,
  tier:  0,         // turret upgrade tier (0–5)
  score: 0,
  lives: 3,
  angle: 0,         // turret angle in degrees (0=up, 90=right)
  bullets:    [],
  enemies:    [],
  effects:    [],
  waveTimer:  0,
  spawnQueue: [],
  spawnTimer: 0,
  lastFire:   0,
  keys:       {},
  highScore:  parseInt(localStorage.getItem('ask-hs') || '0'),
};
let _uid = 0;
const uid = () => ++_uid;

// ── DOM refs ──────────────────────────────────────────────────────────────────
const svgRoot   = document.getElementById('svg');
const layEnemy  = document.getElementById('enemies-layer');
const layBullet = document.getElementById('bullets-layer');
const layTurret = document.getElementById('turret-layer');
const layFx     = document.getElementById('effects-layer');
const layOver   = document.getElementById('overlay-layer');
const flashEl   = document.getElementById('flash');

// ── Init stars ────────────────────────────────────────────────────────────────
(function initStars() {
  const g = document.getElementById('stars-layer');
  for (let i = 0; i < 24; i++) {
    g.appendChild($s('circle', {
      cx: (Math.random() * 390 + 5).toFixed(1),
      cy: (Math.random() * 390 + 5).toFixed(1),
      r:  Math.random() < 0.25 ? 1.4 : 0.7,
      fill: '#ffffff',
      opacity: (Math.random() * 0.28 + 0.06).toFixed(2),
    }));
  }
})();

// ── Turret ────────────────────────────────────────────────────────────────────
let turretGroup = null;

function hexPoints(cx, cy, r) {
  const pts = [];
  for (let i = 0; i < 6; i++) {
    const a = (i * 60 - 30) * Math.PI / 180;
    pts.push(`${(cx + r * Math.cos(a)).toFixed(1)},${(cy + r * Math.sin(a)).toFixed(1)}`);
  }
  return pts.join(' ');
}

function buildTurret() {
  if (turretGroup) turretGroup.remove();
  turretGroup = $s('g');

  const tier    = CFG.tiers[G.tier];
  const laser   = tier.piercing;
  const bc      = laser ? '#00ff41' : '#00ffff';
  const bf      = laser ? 'url(#gg)' : 'url(#gc)';
  const sc      = laser ? '#00ff41' : '#00ffff';

  for (const offsetDeg of tier.angles) {
    const bg = $s('g', { transform: `rotate(${offsetDeg},200,200)` });
    bg.appendChild($s('rect', { x:196, y:157, width:8, height:41, rx:2, fill:bc, filter:bf }));
    bg.appendChild($s('rect', { x:194, y:152, width:12, height:7, rx:1.5, fill:bc, filter:bf }));
    turretGroup.appendChild(bg);
  }

  // Base ring
  turretGroup.appendChild($s('circle', {
    cx:200, cy:200, r:22, fill:'#06061a',
    stroke:sc, 'stroke-width':2, filter:'url(#gc)'
  }));
  // Inner hex
  turretGroup.appendChild($s('polygon', {
    points:hexPoints(200,200,13), fill:'none',
    stroke:sc, 'stroke-width':1, opacity:0.5
  }));
  // Center dot
  turretGroup.appendChild($s('circle', { cx:200, cy:200, r:3, fill:sc, filter:'url(#gc)' }));

  // Laser-tier pulse ring
  if (laser) {
    const pr = $s('circle', {
      cx:200, cy:200, r:29, fill:'none',
      stroke:'#00ff41', 'stroke-width':1.5, filter:'url(#gg)'
    });
    const a1 = $s('animate', { attributeName:'r', values:'29;36;29', dur:'0.9s', repeatCount:'indefinite' });
    const a2 = $s('animate', { attributeName:'opacity', values:'0.7;0.1;0.7', dur:'0.9s', repeatCount:'indefinite' });
    pr.appendChild(a1); pr.appendChild(a2);
    turretGroup.appendChild(pr);
  }

  layTurret.appendChild(turretGroup);
  syncTurretAngle();
}

function syncTurretAngle() {
  if (turretGroup) turretGroup.setAttribute('transform', `rotate(${G.angle},200,200)`);
}

function muzzlePos(angleOff) {
  const a = (G.angle + (angleOff || 0)) * Math.PI / 180;
  return {
    x:  200 + CFG.muzzleOffset * Math.sin(a),
    y:  200 - CFG.muzzleOffset * Math.cos(a),
    vx: CFG.bulletSpeed * Math.sin(a),
    vy: -CFG.bulletSpeed * Math.cos(a),
  };
}

// ── Bullets ───────────────────────────────────────────────────────────────────
function fireBullet(angleOff, piercing) {
  const { x, y, vx, vy } = muzzlePos(angleOff);
  const el = $s('circle', {
    r: CFG.bulletR, fill: piercing ? '#00ff41' : '#00ffff',
    filter: piercing ? 'url(#gg)' : 'url(#gc)',
  });
  layBullet.appendChild(el);
  G.bullets.push({ id:uid(), x, y, vx, vy, el, pierces: piercing ? 3 : 1 });
  spawnMuzzleFlash(x, y);
}

function autoFire(dt) {
  const tier = CFG.tiers[G.tier];
  G.lastFire += dt;
  if (G.lastFire >= 1 / tier.rate) {
    G.lastFire = 0;
    for (const a of tier.angles) fireBullet(a, tier.piercing);
  }
}

function updateBullets(dt) {
  for (let i = G.bullets.length - 1; i >= 0; i--) {
    const b = G.bullets[i];
    b.x += b.vx * dt; b.y += b.vy * dt;
    b.el.setAttribute('cx', b.x.toFixed(1));
    b.el.setAttribute('cy', b.y.toFixed(1));
    if (b.x < -20 || b.x > 420 || b.y < -20 || b.y > 420) {
      b.el.remove(); G.bullets.splice(i, 1);
    }
  }
}

// ── Enemies ───────────────────────────────────────────────────────────────────
function buildWaveQueue(w) {
  const q = [];
  for (let i = 0; i < 2 + w * 2; i++) q.push('basic');
  if (w >= 2) for (let i = 0; i < w - 1; i++) q.push('scout');
  if (w >= 4) for (let i = 0; i < w - 3; i++) q.push('speeder');
  if (w >= 4) for (let i = 0; i < Math.floor((w - 3) / 2); i++) q.push('tank');
  if (w >= 5) for (let i = 0; i < Math.floor((w - 4) / 2); i++) q.push('splitter');
  if (w >= 7) for (let i = 0; i < Math.floor((w - 6) / 2); i++) q.push('armored');
  if (w % 5 === 0) q.push('boss');
  // Fisher-Yates shuffle
  for (let i = q.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [q[i], q[j]] = [q[j], q[i]];
  }
  return q;
}

function spawnEnemy(type, pos) {
  const tc = CFG.types[type];
  let x, y;
  if (pos) { x = pos.x; y = pos.y; }
  else {
    const a = Math.random() * Math.PI * 2;
    x = 200 + CFG.spawnR * Math.cos(a);
    y = 200 + CFG.spawnR * Math.sin(a);
  }
  const half = tc.size / 2;
  const gf = { 'basic':'url(#gc)', 'scout':'url(#gm)', 'speeder':'url(#gm)', 'tank':'url(#gy)', 'splitter':'url(#gg)', 'armored':'url(#gy)', 'boss':'url(#gy)' }[type];

  const grp = $s('g');
  const rect = $s('rect', {
    x:-half, y:-half, width:tc.size, height:tc.size,
    fill:tc.color + '1a', stroke:tc.color, 'stroke-width':1.5, filter:gf,
  });
  rect.classList.add(tc.spinCls);
  grp.appendChild(rect);

  // HP pips for multi-hp enemies
  let hpEl = null;
  if (tc.hp > 1) {
    hpEl = $s('text', {
      x:0, y:half + 9, 'text-anchor':'middle',
      fill:tc.color, 'font-size':7, 'font-family':'Courier New',
    });
    hpEl.textContent = '●'.repeat(tc.hp);
    grp.appendChild(hpEl);
  }

  grp.setAttribute('transform', `translate(${x.toFixed(1)},${y.toFixed(1)})`);
  layEnemy.appendChild(grp);

  const speedScale = 1 + (G.wave - 1) * 0.045;
  G.enemies.push({
    id:uid(), type, x, y, hp:tc.hp, maxHp:tc.hp,
    speed: tc.speed * speedScale,
    grp, hpEl,
    drift: (Math.random() - 0.5) * 0.25,
    t: 0,
    zigzagAmp: tc.zigzag ? (Math.random() * 1.0 + 0.7) : 0,
  });
}

function updateEnemies(dt) {
  for (let i = G.enemies.length - 1; i >= 0; i--) {
    const e = G.enemies[i];
    const dx = 200 - e.x, dy = 200 - e.y;
    const dist = Math.hypot(dx, dy);
    if (dist < CFG.hitR) { hitTurret(); removeEnemy(i); continue; }
    e.t += dt;
    const base   = Math.atan2(dy, dx);
    const swerve = e.zigzagAmp > 0 ? Math.sin(e.t * 4.5) * e.zigzagAmp : e.drift;
    e.x += Math.cos(base + swerve) * e.speed * dt;
    e.y += Math.sin(base + swerve) * e.speed * dt;
    e.grp.setAttribute('transform', `translate(${e.x.toFixed(1)},${e.y.toFixed(1)})`);
  }
}

function removeEnemy(i) {
  G.enemies[i].grp.remove();
  G.enemies.splice(i, 1);
}

function killEnemy(e, i) {
  const tc = CFG.types[e.type];
  spawnExplosion(e.x, e.y, tc.color, e.type === 'boss' ? 14 : 8);
  if (e.type === 'splitter') {
    spawnEnemy('basic', { x:e.x + 10, y:e.y });
    spawnEnemy('basic', { x:e.x - 10, y:e.y });
  }
  if (e.type === 'boss') {
    spawnEnemy('tank', { x:e.x + 18, y:e.y });
    spawnEnemy('tank', { x:e.x - 18, y:e.y });
  }
  G.score += tc.score;
  document.getElementById('score-val').textContent = G.score;
  if (G.score > G.highScore) {
    G.highScore = G.score;
    localStorage.setItem('ask-hs', G.highScore);
  }
  removeEnemy(i);
}


// ── Collisions ────────────────────────────────────────────────────────────────
function checkCollisions() {
  for (let bi = G.bullets.length - 1; bi >= 0; bi--) {
    const b = G.bullets[bi];
    let gone = false;

    // vs enemies
    for (let ei = G.enemies.length - 1; ei >= 0; ei--) {
      const e = G.enemies[ei];
      const half = CFG.types[e.type].size / 2 + CFG.bulletR;
      if (Math.abs(b.x - e.x) < half && Math.abs(b.y - e.y) < half) {
        e.hp--;
        if (e.hpEl) e.hpEl.textContent = '●'.repeat(Math.max(0, e.hp));
        if (e.hp <= 0) {
          killEnemy(e, ei);
        } else {
          // Armored: color shifts red as it takes damage
          if (e.type === 'armored') {
            const dmgColors = ['#ff0044','#ff2200','#ff4400','#ff6600','#ff8800','#ffaa00'];
            const col = dmgColors[Math.max(0, e.hp - 1)];
            const rect = e.grp.querySelector('rect');
            rect.setAttribute('stroke', col);
            rect.setAttribute('fill', col + '22');
            if (e.hpEl) e.hpEl.setAttribute('fill', col);
          } else {
            // Brief damage flash
            const rect = e.grp.querySelector('rect');
            rect.style.opacity = '0.25';
            setTimeout(() => { if (rect.isConnected) rect.style.opacity = ''; }, 110);
          }
        }
        b.pierces--;
        if (b.pierces <= 0) {
          b.el.remove(); G.bullets.splice(bi, 1); gone = true; break;
        }
      }
    }
    if (gone) continue;
  }
}


// ── Lives UI ──────────────────────────────────────────────────────────────────
function buildLivesUI() {
  const row = document.getElementById('lives-row');
  row.innerHTML = '';
  for (let i = 0; i < 3; i++) {
    const s = document.createElementNS(NS, 'svg');
    s.setAttribute('viewBox', '0 0 18 18');
    s.setAttribute('class', 'life-pip');
    setSVGHTML(s,
      `<circle cx="9" cy="9" r="6" fill="none" stroke="#00ffff" stroke-width="1.8"/>
       <rect x="7" y="2" width="4" height="7" rx="1" fill="#00ffff"/>
       <rect x="6.2" y="1.2" width="5.6" height="2" rx="0.8" fill="#00ffff"/>`
    );
    row.appendChild(s);
  }
}

function updateLivesUI() {
  document.querySelectorAll('.life-pip').forEach((el, i) => {
    el.classList.toggle('lost', i >= G.lives);
  });
}

// ── Turret hit ────────────────────────────────────────────────────────────────
function hitTurret() {
  G.lives--;
  updateLivesUI();
  doFlash();
  if (G.lives <= 0) { setTimeout(gameOver, 200); }
}

function doFlash() {
  flashEl.classList.add('on');
  setTimeout(() => flashEl.classList.remove('on'), 180);
}

// ── Effects ───────────────────────────────────────────────────────────────────
function spawnExplosion(x, y, color, count) {
  const n = count || 8;
  const lines = [];
  for (let i = 0; i < n; i++) {
    const a = (i / n) * Math.PI * 2;
    const el = $s('line', {
      x1:x, y1:y, x2:x, y2:y,
      stroke:color, 'stroke-width':1.6, 'stroke-linecap':'round', filter:'url(#gc)',
    });
    layFx.appendChild(el);
    lines.push({ el, ax:Math.cos(a), ay:Math.sin(a) });
  }
  G.effects.push({ k:'explode', x, y, t:0, T:0.38, lines });
}

function spawnMuzzleFlash(x, y) {
  const el = $s('circle', { cx:x, cy:y, r:9, fill:'#00ffff', opacity:'0.85', filter:'url(#gc)' });
  layFx.appendChild(el);
  G.effects.push({ k:'flash', t:0, T:0.07, el });
}

function spawnRingEffect(x, y, color, startR) {
  const el = $s('circle', { cx:x, cy:y, r:startR || CFG.dropR, fill:'none',
    stroke:color, 'stroke-width':2.5, filter:'url(#gm)' });
  layFx.appendChild(el);
  G.effects.push({ k:'ring', t:0, T:0.45, el, x, y, r0:startR || CFG.dropR });
}

function spawnNovaBlast() {
  const el = $s('circle', { cx:200, cy:200, r:8, fill:'none',
    stroke:'#ff00ff', 'stroke-width':5, filter:'url(#gm)' });
  layFx.appendChild(el);
  G.effects.push({ k:'nova', t:0, T:0.65, el });
}

function updateEffects(dt) {
  for (let i = G.effects.length - 1; i >= 0; i--) {
    const ef = G.effects[i];
    ef.t += dt;
    const p = Math.min(ef.t / ef.T, 1);

    if (ef.k === 'explode') {
      const len = 28 * p;
      const op  = 1 - p;
      for (const { el, ax, ay } of ef.lines) {
        el.setAttribute('x2', (ef.x + ax * len).toFixed(1));
        el.setAttribute('y2', (ef.y + ay * len).toFixed(1));
        el.setAttribute('opacity', op.toFixed(2));
      }
    } else if (ef.k === 'flash') {
      ef.el.setAttribute('opacity', (1 - p).toFixed(2));
    } else if (ef.k === 'ring') {
      ef.el.setAttribute('r', (ef.r0 + 22 * p).toFixed(1));
      ef.el.setAttribute('opacity', (1 - p).toFixed(2));
    } else if (ef.k === 'nova') {
      ef.el.setAttribute('r', (8 + 290 * p).toFixed(1));
      ef.el.setAttribute('stroke-width', (5 * (1 - p * 0.7)).toFixed(1));
      ef.el.setAttribute('opacity', (1 - p * p).toFixed(2));
    }

    if (ef.t >= ef.T) {
      if (ef.k === 'explode') ef.lines.forEach(l => l.el.remove());
      else ef.el.remove();
      G.effects.splice(i, 1);
    }
  }
}

// ── Wave system ───────────────────────────────────────────────────────────────
function startWave(n) {
  const newTier = tierForWave(n);
  const tierChanged = newTier > G.tier;
  G.wave = n;
  G.tier = newTier;
  G.spawnQueue = buildWaveQueue(n);
  G.spawnTimer = 0;
  G.phase = 'playing';
  document.getElementById('wave-val').textContent = n;
  document.getElementById('tier-label').textContent = CFG.tiers[newTier].label;
  if (tierChanged) buildTurret();
  clearOverlay();
}

function tickSpawnQueue(dt) {
  if (!G.spawnQueue.length) return;
  G.spawnTimer -= dt;
  if (G.spawnTimer <= 0) {
    spawnEnemy(G.spawnQueue.shift());
    G.spawnTimer = CFG.spawnInterval;
  }
}

function checkWaveClear() {
  if (!G.enemies.length && !G.spawnQueue.length) {
    G.phase = 'wave_clear';
    G.waveTimer = CFG.waveDelay;
    showWaveClearMsg(G.wave + 1);
  }
}

// ── Overlay screens ───────────────────────────────────────────────────────────
function clearOverlay() {
  while (layOver.firstChild) layOver.firstChild.remove();
  layOver._cd = null;
}

function overlayBg() {
  layOver.appendChild($s('rect', { width:400, height:400, fill:'#05050f', opacity:'0.93' }));
}

function svgText(x, y, size, color, letterSpc, txt, filter) {
  const el = $s('text', {
    x, y, 'text-anchor':'middle', fill:color,
    'font-size':size, 'font-family':'Courier New', 'font-weight':'bold',
    'letter-spacing':letterSpc,
  });
  if (filter) el.setAttribute('filter', filter);
  el.textContent = txt;
  return el;
}

function showTitleScreen() {
  clearOverlay();
  overlayBg();
  layOver.appendChild(svgText(200, 140, 44, '#00ffff', 6, 'ASKAN', 'url(#gc)'));
  layOver.appendChild(svgText(200, 188, 44, '#ff00ff', 6, 'OIDS',  'url(#gm)'));
  layOver.appendChild(svgText(200, 218, 10, '#00ffff55', 3, 'ASTEROIDS × ARKANOID'));

  const tap = svgText(200, 270, 15, '#ff00ff', 2, '— TAP TO START —', 'url(#gm)');
  const a1 = $s('animate', { attributeName:'opacity', values:'1;0.15;1', dur:'1.3s', repeatCount:'indefinite' });
  tap.appendChild(a1);
  layOver.appendChild(tap);

  layOver.appendChild(svgText(200, 308, 9, '#00ffff33', 1.5, 'DRAG OR ← → TO ROTATE TURRET'));

  if (G.highScore > 0) {
    layOver.appendChild(svgText(200, 340, 12, '#ffff00', 2, `HI: ${G.highScore}`, 'url(#gy)'));
  }

  const hit = $s('rect', { width:400, height:400, fill:'transparent', cursor:'pointer' });
  hit.addEventListener('click', () => { hit.remove(); startGame(); }, { once:true });
  layOver.appendChild(hit);
}

function showWaveClearMsg(nextWave) {
  clearOverlay();
  const newTier = tierForWave(nextWave);
  const upgrading = newTier > G.tier;
  const yBase = upgrading ? 165 : 185;
  layOver.appendChild(svgText(200, yBase, 16, '#ff00ff', 3, `WAVE ${nextWave} INCOMING`, 'url(#gm)'));
  if (upgrading) {
    const up = svgText(200, yBase + 32, 13, '#00ff41', 2,
      `▲ CANNON: ${CFG.tiers[newTier].label}`, 'url(#gg)');
    const a1 = $s('animate', { attributeName:'opacity', values:'1;0.3;1', dur:'0.7s', repeatCount:'indefinite' });
    up.appendChild(a1);
    layOver.appendChild(up);
  }
  const cd = svgText(200, yBase + (upgrading ? 76 : 52), 32, '#00ffff', 0,
    String(Math.ceil(CFG.waveDelay)), 'url(#gc)');
  layOver.appendChild(cd);
  layOver._cd = cd;
}

function showGameOverScreen() {
  clearOverlay();
  overlayBg();
  layOver.appendChild(svgText(200, 155, 38, '#ff2244', 4, 'GAME OVER', 'url(#gm)'));
  layOver.appendChild(svgText(200, 205, 17, '#00ffff', 2, `SCORE: ${G.score}`));

  if (G.score >= G.highScore && G.score > 0) {
    layOver.appendChild(svgText(200, 234, 11, '#ffff00', 2, '★ NEW HIGH SCORE ★', 'url(#gy)'));
  } else if (G.highScore > 0) {
    layOver.appendChild(svgText(200, 234, 11, '#00ffff55', 2, `BEST: ${G.highScore}`));
  }

  const tap = svgText(200, 285, 15, '#ff00ff', 2, '— TAP TO RESTART —');
  const a1 = $s('animate', { attributeName:'opacity', values:'1;0.15;1', dur:'1.3s', repeatCount:'indefinite' });
  tap.appendChild(a1);
  layOver.appendChild(tap);

  const hit = $s('rect', { width:400, height:400, fill:'transparent', cursor:'pointer' });
  // Delay to prevent accidental immediate restart
  setTimeout(() => {
    hit.addEventListener('click', () => { hit.remove(); startGame(); }, { once:true });
    layOver.appendChild(hit);
  }, 900);
}

function showPauseScreen() {
  clearOverlay();
  layOver.appendChild(svgText(200, 195, 30, '#00ffff', 5, 'PAUSED', 'url(#gc)'));
  layOver.appendChild(svgText(200, 228, 10, '#00ffff55', 2, 'P / ESC TO RESUME'));
}

// ── Game lifecycle ────────────────────────────────────────────────────────────
function startGame() {
  [layEnemy, layBullet, layFx].forEach(l => { while(l.firstChild) l.firstChild.remove(); });

  Object.assign(G, {
    phase:'playing', wave:0, tier:0, score:0, lives:3, angle:0,
    bullets:[], enemies:[], effects:[],
    lastFire:0, spawnQueue:[], spawnTimer:0,
  });

  document.getElementById('score-val').textContent = '0';
  updateAngleDisplay();
  buildLivesUI();
  buildTurret();
  startWave(1);
}

function gameOver() {
  G.phase = 'game_over';
  showGameOverScreen();
}

// ── Main update ───────────────────────────────────────────────────────────────
function update(dt) {
  if (G.phase === 'title' || G.phase === 'game_over' || G.phase === 'paused') return;

  // Keyboard rotation (always in playing + wave_clear)
  if (G.keys['ArrowLeft'] || G.keys['ArrowRight']) {
    const dir = G.keys['ArrowRight'] ? 1 : -1;
    G.angle = ((G.angle + dir * CFG.keyRotDeg * dt) % 360 + 360) % 360;
    updateAngleDisplay();
    syncTurretAngle();
  }

  if (G.phase === 'wave_clear') {
    G.waveTimer -= dt;
    if (layOver._cd) layOver._cd.textContent = Math.max(1, Math.ceil(G.waveTimer));
    if (G.waveTimer <= 0) startWave(G.wave + 1);
    updateEffects(dt);
    return;
  }

  // Playing
  tickSpawnQueue(dt);
  autoFire(dt);
  updateBullets(dt);
  updateEnemies(dt);
  checkCollisions();
  updateEffects(dt);
  checkWaveClear();
}

// ── Game loop ─────────────────────────────────────────────────────────────────
let _lastTS = 0;
function loop(ts) {
  const dt = Math.min((ts - _lastTS) / 1000, 0.05);
  _lastTS = ts;
  update(dt);
  requestAnimationFrame(loop);
}

// ── Controls ──────────────────────────────────────────────────────────────────
function updateAngleDisplay() {
  const a = Math.round(G.angle);
  const arrows = ['↑','↗','→','↘','↓','↙','←','↖'];
  const dir = arrows[Math.round(a / 45) % 8];
  document.getElementById('angle-display').textContent =
    `${dir} ${String(a).padStart(3,'0')}°`;
}

// ── Infinity scrubber ─────────────────────────────────────────────────────────
// Dragging right = clockwise, left = counter-clockwise. No fixed endpoints.
const scrubberEl = document.getElementById('scrubber');
const ticksEl    = document.getElementById('scrubber-ticks');
const SCRUB_SENS = 0.9;  // degrees per pixel of drag

let scrubActive = false;
let scrubLastX  = 0;
let tickOffset  = 0;  // for scrolling tick visual

function scrubStart(clientX) {
  scrubActive = true;
  scrubLastX  = clientX;
}
function scrubMove(clientX) {
  if (!scrubActive) return;
  const dx = clientX - scrubLastX;
  scrubLastX = clientX;
  G.angle = ((G.angle + dx * SCRUB_SENS) % 360 + 360) % 360;
  tickOffset = ((tickOffset - dx) % 18 + 18) % 18;
  ticksEl.style.backgroundPositionX = `${-tickOffset}px`;
  updateAngleDisplay();
  syncTurretAngle();
}
function scrubEnd() { scrubActive = false; }

// Touch
scrubberEl.addEventListener('touchstart',  e => { e.preventDefault(); scrubStart(e.touches[0].clientX); }, { passive:false });
scrubberEl.addEventListener('touchmove',   e => { e.preventDefault(); scrubMove(e.touches[0].clientX);  }, { passive:false });
scrubberEl.addEventListener('touchend',    () => scrubEnd());
scrubberEl.addEventListener('touchcancel', () => scrubEnd());
// Mouse (desktop)
scrubberEl.addEventListener('mousedown', e => scrubStart(e.clientX));
document.addEventListener('mousemove',  e => scrubMove(e.clientX));
document.addEventListener('mouseup',    () => scrubEnd());

document.addEventListener('keydown', e => {
  G.keys[e.key] = true;
  if (e.key === 'p' || e.key === 'P' || e.key === 'Escape') {
    if (G.phase === 'playing') { G.phase = 'paused'; showPauseScreen(); }
    else if (G.phase === 'paused') { G.phase = 'playing'; clearOverlay(); }
  }
  if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup', e => { delete G.keys[e.key]; });

// Landscape auto-pause
let _landscapePaused = false;
window.matchMedia('(orientation: landscape)').addEventListener('change', e => {
  if (e.matches && G.phase === 'playing') {
    G.phase = 'paused'; _landscapePaused = true;
  } else if (!e.matches && _landscapePaused) {
    G.phase = 'playing'; _landscapePaused = false; clearOverlay();
  }
});

// ── Boot ──────────────────────────────────────────────────────────────────────
showTitleScreen();
requestAnimationFrame(ts => { _lastTS = ts; requestAnimationFrame(loop); });
</script>
